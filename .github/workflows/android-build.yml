name: Android build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-phone:
    name: Build Phone debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build Phone debug APK
        run: gradle assemblePhoneDebug

      - name: Upload Phone debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SafePulse-phone-debug-apk
          path: app/build/outputs/apk/phone/debug/*.apk

  build-tv:
    name: Build TV debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build TV debug APK
        run: gradle assembleTvDebug

      - name: Upload TV debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SafePulse-tv-debug-apk
          path: app/build/outputs/apk/tv/debug/*.apk
